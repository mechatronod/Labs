<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PID Laboratuvarı - Gerçekçi Gürültü Modu</title>
    <style>
        body { margin: 0; padding: 10px; background-color: #d1d8e0; font-family: 'Segoe UI', sans-serif; }
        #pid-zn-app { box-sizing: border-box; background:#f7f9fb; border:3px solid #4b6584; padding:20px; border-radius:12px; max-width:1300px; margin:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .panel-container { display:grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 1000px) { .panel-container { grid-template-columns: 1fr; } }
        .status-bar { display:flex; justify-content:space-between; flex-wrap:wrap; background:#1e272e; color:#0be881; padding:15px; border-radius:8px; border:2px solid #485460; font-family: 'Courier New', monospace; margin-bottom:15px; }
        .control-box { background:#fff; padding:15px; border:1px solid #d1d9e6; border-radius:8px; margin-bottom:12px; }
        label { font-size:12px; font-weight: bold; display:block; margin-top:8px; }
        input[type=range] { width: 100%; margin-top: 5px; accent-color: #4b6584; }
        .btn-group { display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px; }
        button { cursor: pointer; transition: 0.2s; border: none; border-radius: 4px; font-weight: bold; padding: 10px; }
        #msg-box { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: #eb3b5a; color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; display: none; z-index: 10; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>

<div id="pid-zn-app">
    <div class="status-bar">
        <div>SP: <b id="real-sp">50.0</b></div>
        <div>PV: <b id="real-pv">0.0</b></div>
        <div>PWM: <b id="real-pwm">0</b>%</div>
        <div>ZETA: <b id="real-zeta">0.20</b></div>
        <div>MOD: <span id="real-osc-type">-</span></div>
    </div>

    <div class="panel-container">
        <div class="side-panel">
            <div class="control-box">
                <h4>PID Kontrol Ünitesi</h4>
                <label>Hedef (SP): <b id="txt-sp">50</b></label>
                <input type="range" id="input-sp" min="10" max="90" value="50">

                <label style="color:#d35400;">Kp (Kazanç): <b id="txt-kp">1.00</b></label>
                <input type="range" id="input-kp" min="0" max="30" step="0.1" value="1.00">

                <label style="color:#27ae60;">Ki (Hafıza): <b id="txt-ki">0.00</b></label>
                <input type="range" id="input-ki" min="0" max="10" step="0.01" value="0.00">

                <label style="color:#2980b9;">Kd (Fren): <b id="txt-kd">0.00</b></label>
                <input type="range" id="input-kd" min="0" max="10" step="0.01" value="0.00">

                <div class="btn-group">
                    <button id="btn-run" style="background:#05c46b; color:white;">⏸ Duraklat</button>
                    <button id="btn-reset" style="background:#808e9b; color:white;">↺ Yeni Sistem</button>
                </div>
                <button id="btn-zn-mode" style="width:100%; padding:10px; background:#575fcf; color:white; margin-top:8px;">Z-N TEST MODU</button>
            </div>

            <div class="control-box" style="background:#f1f2f6;">
                <h4>Görünüm Ayarları</h4>
                <label>Dikey Ölçek: <b id="txt-yzoom">1.0x</b></label>
                <input type="range" id="input-y-zoom" min="0.5" max="10" step="0.1" value="1">

                <label>Dikey Kaydırma: <b id="txt-voffset">0</b></label>
                <input type="range" id="input-voffset" min="-100" max="100" value="0">

                <label>Zaman Penceresi: <b id="txt-window">20s</b></label>
                <input type="range" id="input-window" min="5" max="60" step="1" value="20">
            </div>

            <div id="zn-results" style="background:#d1f2eb; padding:12px; border:1px solid #16a085; border-radius:8px; font-size:12px;">
                <b>Z-N Analizör:</b><br>
                Ku: <span id="auto-ku">-</span> | Tu: <span id="auto-tu">-</span><br>
                Hesaplanan: <span id="auto-pid" style="color:#000; font-weight:bold;">-</span>
            </div>
        </div>

        <div style="background:#000; border:4px solid #1e272e; border-radius:8px; position:relative; overflow:hidden;">
            <div id="msg-box">SİSTEM PARAMETRELERİ DEĞİŞTİRİLDİ</div>
            <canvas id="graphCanvas" width="850" height="550" style="width:100%; display:block;"></canvas>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById("graphCanvas");
        const ctx = canvas.getContext("2d");

        const sim = {
            dt: 0.02, time: 0, running: true, znMode: false,
            sp: 50, kp: 1, ki: 0, kd: 0,
            integral: 0, lastPv: 0, pv: 0, pvDot: 0,
            Kplant: 1.2, wn: 1.5, zeta: 0.2, // Zeta artık random olacak
            yZoom: 1.0, windowSec: 20, vOffset: 0,
            history: [], peaks: [], prevSlope: 0, oscType: "-", lastTu: null,
            noiseAmp: 0.4 // %0.4 oranında gürültü
        };

        const el = {
            sp: document.getElementById("input-sp"), kp: document.getElementById("input-kp"),
            ki: document.getElementById("input-ki"), kd: document.getElementById("input-kd"),
            yZoom: document.getElementById("input-y-zoom"), vOffset: document.getElementById("input-voffset"),
            windowSec: document.getElementById("input-window"),
            txtSp: document.getElementById("txt-sp"), txtKp: document.getElementById("txt-kp"),
            txtKi: document.getElementById("txt-ki"), txtKd: document.getElementById("txt-kd"),
            txtYZoom: document.getElementById("txt-yzoom"), txtVOffset: document.getElementById("txt-voffset"),
            txtWindow: document.getElementById("txt-window"),
            realSp: document.getElementById("real-sp"), realPv: document.getElementById("real-pv"),
            realPwm: document.getElementById("real-pwm"), realZeta: document.getElementById("real-zeta"),
            realOscType: document.getElementById("real-osc-type"), btnRun: document.getElementById("btn-run"),
            btnReset: document.getElementById("btn-reset"), btnZN: document.getElementById("btn-zn-mode"),
            autoKu: document.getElementById("auto-ku"), autoTu: document.getElementById("auto-tu"), autoPid: document.getElementById("auto-pid"),
            msg: document.getElementById("msg-box")
        };

        function sync() {
            sim.sp = parseFloat(el.sp.value);
            sim.kp = parseFloat(el.kp.value);
            sim.ki = sim.znMode ? 0 : parseFloat(el.ki.value);
            sim.kd = sim.znMode ? 0 : parseFloat(el.kd.value);
            sim.yZoom = parseFloat(el.yZoom.value);
            sim.vOffset = parseFloat(el.vOffset.value);
            sim.windowSec = parseFloat(el.windowSec.value);
            
            el.txtSp.textContent = sim.sp;
            el.txtKp.textContent = sim.kp.toFixed(1);
            el.txtKi.textContent = sim.ki.toFixed(2);
            el.txtKd.textContent = sim.kd.toFixed(2);
            el.txtYZoom.textContent = sim.yZoom.toFixed(1) + "x";
            el.txtVOffset.textContent = sim.vOffset;
            el.txtWindow.textContent = sim.windowSec + "s";
            el.realSp.textContent = sim.sp.toFixed(1);
            el.realZeta.textContent = sim.zeta.toFixed(3);
        }

        function toY(val, centerY, pxPerUnit) {
            return centerY - (val - (50 + sim.vOffset)) * pxPerUnit;
        }

        function draw() {
            const w = canvas.width; const h = canvas.height;
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
            const leftPad = 55; const rightPad = 20; const topPad = 40; const bottomPad = 40;
            const plotW = w - leftPad - rightPad; const plotH = h - topPad - bottomPad;
            const centerY = topPad + plotH / 2;
            const pxPerUnit = (plotH / 100) * sim.yZoom;

            // Grid
            ctx.strokeStyle = "#121d12"; ctx.lineWidth = 1;
            ctx.fillStyle = "#006633"; ctx.font = "10px monospace";
            for (let v = -200; v <= 300; v += 10) {
                let y = toY(v, centerY, pxPerUnit);
                if (y < 0 || y > h) continue;
                ctx.beginPath(); ctx.moveTo(leftPad, y); ctx.lineTo(w - rightPad, y); ctx.stroke();
                if (v % 20 === 0) ctx.fillText(v, leftPad - 8, y + 4);
            }

            const startT = Math.max(0, sim.time - sim.windowSec);

            // Setpoint
            ctx.setLineDash([8, 6]); ctx.strokeStyle = "rgba(255, 100, 100, 0.4)";
            let spy = toY(sim.sp, centerY, pxPerUnit);
            ctx.beginPath(); ctx.moveTo(leftPad, spy); ctx.lineTo(w - rightPad, spy); ctx.stroke();
            ctx.setLineDash([]);

            // PV (Gürültülü dalga)
            ctx.strokeStyle = "#00ff66"; ctx.lineWidth = 2;
            ctx.beginPath();
            let first = true;
            for (let p of sim.history) {
                if (p.t < startT) continue;
                let x = leftPad + ((p.t - startT) / sim.windowSec) * plotW;
                let y = toY(p.pv, centerY, pxPerUnit);
                if (first) { ctx.moveTo(x, y); first = false; } 
                else { ctx.lineTo(x, y); }
            }
            ctx.stroke();
        }

        function loop() {
            if (sim.running) {
                // Gürültülü Ölçüm: Sensör hatası simülasyonu
                const noise = (Math.random() - 0.5) * sim.noiseAmp;
                const measuredPv = sim.pv + noise;
                
                const error = sim.sp - measuredPv;
                const deriv = -(measuredPv - sim.lastPv) / sim.dt;
                const out = sim.kp * error + sim.ki * sim.integral + sim.kd * deriv;
                const pwm = Math.max(0, Math.min(100, out));

                // Anti-windup
                if (out === pwm || (out > 100 && error < 0) || (out < 0 && error > 0)) {
                    sim.integral += error * sim.dt;
                }
                sim.integral = Math.max(-50, Math.min(50, sim.integral));
                
                // Fiziksel Model
                const ydd = sim.Kplant * sim.wn * sim.wn * pwm - 2 * sim.zeta * sim.wn * sim.pvDot - sim.wn * sim.wn * sim.pv;
                const oldPv = sim.pv;
                sim.pvDot += ydd * sim.dt;
                sim.pv += sim.pvDot * sim.dt;
                
                // Peak detection
                const slope = sim.pv - oldPv;
                if (sim.prevSlope > 0 && slope <= 0 && Math.abs(sim.pv - sim.sp) > 0.5) {
                    sim.peaks.push({t: sim.time, value: sim.pv});
                    if (sim.peaks.length > 10) sim.peaks.shift();
                    if (sim.peaks.length >= 3) {
                        const t2 = sim.peaks[sim.peaks.length-1];
                        const t1 = sim.peaks[sim.peaks.length-2];
                        sim.lastTu = t2.t - t1.t;
                        const r = Math.abs(t2.value - sim.sp) / Math.abs(t1.value - sim.sp);
                        sim.oscType = r < 0.94 ? "SÖNÜMLÜ" : (r > 1.06 ? "KARARSIZ" : "KRİTİK SALINIM");
                    }
                }
                sim.prevSlope = slope;
                sim.lastPv = measuredPv;
                sim.time += sim.dt;
                sim.history.push({t: sim.time, pv: measuredPv});
                if (sim.history.length > 5000) sim.history.shift();

                el.realPv.textContent = measuredPv.toFixed(1);
                el.realPwm.textContent = pwm.toFixed(0);
                el.realOscType.textContent = sim.oscType;
                
                if (sim.znMode && sim.oscType.includes("KRİTİK")) {
                    const ku = sim.kp; const tu = sim.lastTu;
                    const kp = 0.6 * ku; const ki = (2 * kp) / tu; const kd = (kp * tu) / 8;
                    el.autoKu.textContent = ku.toFixed(2);
                    el.autoTu.textContent = tu.toFixed(2) + "s";
                    el.autoPid.textContent = `Kp:${kp.toFixed(1)} Ki:${ki.toFixed(2)} Kd:${kd.toFixed(2)}`;
                }
            }
            sync();
            draw();
            requestAnimationFrame(loop);
        }

        el.btnReset.onclick = () => {
            // Sistemi rastgeleleştir
            sim.pv = 0; sim.pvDot = 0; sim.integral = 0; sim.history = []; sim.peaks = []; sim.time = 0;
            sim.zeta = 0.05 + Math.random() * 0.45; // 0.05 - 0.50 arası random damping
            sim.oscType = "-";
            
            // Kullanıcıya bildirim ver
            el.msg.style.display = "block";
            setTimeout(() => { el.msg.style.display = "none"; }, 3000);
        };
        
        el.btnRun.onclick = () => { sim.running = !sim.running; el.btnRun.textContent = sim.running ? "⏸ Duraklat" : "▶ Devam Et"; };
        el.btnZN.onclick = () => { sim.znMode = !sim.znMode; el.btnZN.style.background = sim.znMode ? "#eb3b5a" : "#575fcf"; };

        loop();
    })();
</script>
</body>
</html>
