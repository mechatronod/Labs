<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PID Analiz - Proteus Stil Zoom</title>
    <style>
        body { margin: 0; padding: 10px; background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; }
        #pid-zn-app { box-sizing: border-box; background:#f7f9fb; border:2px solid #2c3e50; padding:20px; border-radius:12px; max-width:1200px; margin:auto; }
        .panel-container { display:grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 950px) { .panel-container { grid-template-columns: 1fr; } }
        .status-bar { display:flex; justify-content:space-between; flex-wrap:wrap; background:#101820; color:#00ff88; padding:12px; border-radius:8px; border:2px solid #333; font-family:monospace; margin-bottom:15px; }
        .control-box { background:#fff; padding:15px; border:1px solid #d7dde5; border-radius:8px; margin-bottom:10px; }
        input[type=range] { width: 100%; margin-top: 5px; cursor: pointer; }
        button { cursor: pointer; transition: 0.2s; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div id="pid-zn-app">
    <h3 style="text-align:center; margin-top:0; color:#2c3e50;">PID & Ziegler–Nichols Simülasyonu</h3>

    <div class="status-bar">
        <div>SP: <span id="real-sp">50.0</span></div>
        <div>PV: <span id="real-pv">0.0</span></div>
        <div>PWM: <span id="real-pwm">0</span>%</div>
        <div>DURUM: <span id="real-status">AKTİF</span></div>
        <div>TEŞHİS: <span id="real-osc-type">-</span></div>
    </div>

    <div class="panel-container">
        <div class="side-panel">
            <div class="control-box">
                <h4 style="margin:0 0 10px 0; font-size:14px;">Kontrol Parametreleri</h4>
                <label style="font-size:12px;">Hedef (SP): <b id="txt-sp">50</b></label>
                <input type="range" id="input-sp" min="0" max="100" value="50">

                <label style="font-size:12px; color:#d35400; display:block; margin-top:10px;">Kp: <b id="txt-kp">1.00</b></label>
                <input type="range" id="input-kp" min="0" max="25" step="0.05" value="1.00">

                <label style="font-size:12px; color:#27ae60; display:block; margin-top:10px;">Ki: <b id="txt-ki">0.00</b></label>
                <input type="range" id="input-ki" min="0" max="5" step="0.01" value="0.00">

                <label style="font-size:12px; color:#2980b9; display:block; margin-top:10px;">Kd: <b id="txt-kd">0.00</b></label>
                <input type="range" id="input-kd" min="0" max="5" step="0.01" value="0.00">

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                    <button id="btn-run" style="padding:10px; background:#16a085; color:white;">⏸ Duraklat</button>
                    <button id="btn-reset" style="padding:10px; background:#7f8c8d; color:white;">↺ Sıfırla</button>
                </div>
                <button id="btn-zn-mode" style="width:100%; padding:10px; background:#8e44ad; color:white; margin-top:8px;">Z-N MODU: KAPALI</button>
            </div>

            <div class="control-box" style="background:#f0f7ff;">
                <h4 style="margin:0 0 10px 0; font-size:14px;">Görünüm (Scope)</h4>
                <label style="font-size:12px;">Dikey Ölçek (V/Div): <b id="txt-yzoom">1.0</b></label>
                <input type="range" id="input-y-zoom" min="0.5" max="8" step="0.1" value="1">
                
                <label style="font-size:12px; display:block; margin-top:10px;">Zaman Ölçeği (s): <b id="txt-window">20</b></label>
                <input type="range" id="input-window" min="5" max="50" step="1" value="20">
            </div>

            <div id="zn-results" style="background:#eefaf2; padding:12px; border:1px solid #9ad3ae; border-radius:8px; font-size:12px;">
                <b>Z-N Hesaplama:</b><br>
                Ku: <span id="auto-ku">-</span> | Tu: <span id="auto-tu">-</span><br>
                Önerilen: <span id="auto-pid" style="color:#1e8449; font-weight:bold;">-</span>
            </div>
        </div>

        <div style="background:#000; border:4px solid #333; border-radius:8px; position:relative; overflow:hidden;">
            <canvas id="graphCanvas" width="820" height="500" style="width:100%; display:block;"></canvas>
            <div style="position:absolute; left:60px; top:10px; color:#555; font-size:10px; font-family:monospace;">OSCILLOSCOPE MODE</div>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById("graphCanvas");
        const ctx = canvas.getContext("2d");

        const sim = {
            dt: 0.02, time: 0, running: true, znMode: false,
            sp: 50, kp: 1, ki: 0, kd: 0,
            integral: 0, lastPv: 0, pv: 0, pvDot: 0,
            Kplant: 1.1, wn: 1.7, zeta: 0.2, // Sistem dinamiği
            yZoom: 1.0, windowSec: 20,
            history: [], peaks: [], prevSlope: 0, 
            oscType: "-", lastTu: null
        };

        const el = {
            sp: document.getElementById("input-sp"), kp: document.getElementById("input-kp"),
            ki: document.getElementById("input-ki"), kd: document.getElementById("input-kd"),
            yZoom: document.getElementById("input-y-zoom"), windowSec: document.getElementById("input-window"),
            txtSp: document.getElementById("txt-sp"), txtKp: document.getElementById("txt-kp"),
            txtKi: document.getElementById("txt-ki"), txtKd: document.getElementById("txt-kd"),
            txtYZoom: document.getElementById("txt-yzoom"), txtWindow: document.getElementById("txt-window"),
            realSp: document.getElementById("real-sp"), realPv: document.getElementById("real-pv"),
            realPwm: document.getElementById("real-pwm"), realStatus: document.getElementById("real-status"),
            realOscType: document.getElementById("real-osc-type"), btnRun: document.getElementById("btn-run"),
            btnReset: document.getElementById("btn-reset"), btnZN: document.getElementById("btn-zn-mode"),
            autoKu: document.getElementById("auto-ku"), autoTu: document.getElementById("auto-tu"), autoPid: document.getElementById("auto-pid")
        };

        function sync() {
            sim.sp = parseFloat(el.sp.value);
            sim.kp = parseFloat(el.kp.value);
            sim.ki = sim.znMode ? 0 : parseFloat(el.ki.value);
            sim.kd = sim.znMode ? 0 : parseFloat(el.kd.value);
            sim.yZoom = parseFloat(el.yZoom.value);
            sim.windowSec = parseFloat(el.windowSec.value);
            
            el.txtSp.textContent = sim.sp;
            el.txtKp.textContent = sim.kp.toFixed(2);
            el.txtKi.textContent = sim.ki.toFixed(2);
            el.txtKd.textContent = sim.kd.toFixed(2);
            el.txtYZoom.textContent = sim.yZoom.toFixed(1) + "x";
            el.txtWindow.textContent = sim.windowSec;
        }

        function draw() {
            const w = canvas.width; const h = canvas.height;
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);

            const leftPad = 50; const rightPad = 20; const topPad = 30; const bottomPad = 30;
            const plotW = w - leftPad - rightPad; const plotH = h - topPad - bottomPad;
            const centerY = topPad + plotH / 2;

            // --- PROTEUS STİL ÖLÇEKLENDİRME ---
            // 50 değerini ekranın tam ortasına (centerY) sabitliyoruz.
            // Zoom arttıkça birim başına düşen piksel artar, yani görünür aralık daralır.
            const pxPerUnit = (plotH / 100) * sim.yZoom;
            
            function toY(val) {
                return centerY - (val - 50) * pxPerUnit;
            }

            // Grid ve Rakamlar
            ctx.strokeStyle = "#1a2a1a"; ctx.lineWidth = 1;
            ctx.fillStyle = "#008844"; ctx.font = "10px monospace";
            ctx.textAlign = "right";

            for (let v = -200; v <= 300; v += 10) {
                let y = toY(v);
                if (y < topPad || y > h - bottomPad) continue;
                ctx.beginPath(); ctx.moveTo(leftPad, y); ctx.lineTo(w - rightPad, y); ctx.stroke();
                ctx.fillText(v, leftPad - 5, y + 4);
            }

            const startT = Math.max(0, sim.time - sim.windowSec);

            // Set Point (Kırmızı Kesik)
            ctx.setLineDash([5, 5]); ctx.strokeStyle = "rgba(255, 50, 50, 0.6)";
            let spy = toY(sim.sp);
            if (spy >= topPad && spy <= h-bottomPad) {
                ctx.beginPath(); ctx.moveTo(leftPad, spy); ctx.lineTo(w - rightPad, spy); ctx.stroke();
            }
            ctx.setLineDash([]);

            // PV Çizgisi (Yeşil Parlak)
            ctx.strokeStyle = "#00ff66"; ctx.lineWidth = 2;
            ctx.beginPath();
            let first = true;
            for (let p of sim.history) {
                if (p.t < startT) continue;
                let x = leftPad + ((p.t - startT) / sim.windowSec) * plotW;
                let y = toY(p.pv);
                if (first) { ctx.moveTo(x, y); first = false; } 
                else { ctx.lineTo(x, y); }
            }
            ctx.stroke();

            // Tepe Noktaları
            ctx.fillStyle = "#ffcc00";
            for (let p of sim.peaks) {
                if (p.t < startT) continue;
                let x = leftPad + ((p.t - startT) / sim.windowSec) * plotW;
                let y = toY(p.value);
                if (y >= topPad && y <= h-bottomPad) {
                    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
                }
            }
        }

        function loop() {
            if (sim.running) {
                const error = sim.sp - sim.pv;
                const deriv = -(sim.pv - sim.lastPv) / sim.dt;
                const out = sim.kp * error + sim.ki * sim.integral + sim.kd * deriv;
                const pwm = Math.max(0, Math.min(100, out));

                if (out === pwm) sim.integral += error * sim.dt; // Anti-windup
                
                // Fiziksel Model (2. Derece)
                const ydd = sim.Kplant * sim.wn * sim.wn * pwm - 2 * sim.zeta * sim.wn * sim.pvDot - sim.wn * sim.wn * sim.pv;
                const oldPv = sim.pv;
                sim.pvDot += ydd * sim.dt;
                sim.pv += sim.pvDot * sim.dt;
                
                // Peak detection
                const slope = sim.pv - oldPv;
                if (sim.prevSlope > 0 && slope <= 0 && Math.abs(sim.pv - sim.sp) > 0.5) {
                    sim.peaks.push({t: sim.time, value: sim.pv});
                    if (sim.peaks.length > 10) sim.peaks.shift();
                    if (sim.peaks.length >= 3) {
                        const t2 = sim.peaks[sim.peaks.length-1];
                        const t1 = sim.peaks[sim.peaks.length-2];
                        sim.lastTu = t2.t - t1.t;
                        const r = Math.abs(t2.value - sim.sp) / Math.abs(t1.value - sim.sp);
                        sim.oscType = r < 0.9 ? "SÖNÜMLÜ" : (r > 1.1 ? "KARARSIZ" : "KRİTİK SALINIM");
                    }
                }
                sim.prevSlope = slope;
                sim.lastPv = oldPv;
                sim.time += sim.dt;
                sim.history.push({t: sim.time, pv: sim.pv});
                if (sim.history.length > 2000) sim.history.shift();

                el.realPv.textContent = sim.pv.toFixed(1);
                el.realPwm.textContent = pwm.toFixed(0);
                el.realOscType.textContent = sim.oscType;
                el.autoKu.textContent = sim.oscType.includes("KRİTİK") ? sim.kp.toFixed(2) : "-";
                el.autoTu.textContent = sim.lastTu ? sim.lastTu.toFixed(2) + "s" : "-";
            }
            sync();
            draw();
            requestAnimationFrame(loop);
        }

        el.btnRun.onclick = () => { sim.running = !sim.running; el.btnRun.textContent = sim.running ? "⏸ Duraklat" : "▶ Devam Et"; };
        el.btnReset.onclick = () => { sim.pv = 0; sim.pvDot = 0; sim.integral = 0; sim.history = []; sim.peaks = []; sim.time = 0; };
        el.btnZN.onclick = () => { sim.znMode = !sim.znMode; el.btnZN.style.background = sim.znMode ? "#c0392b" : "#8e44ad"; };

        loop();
    })();
</script>
</body>
</html>
